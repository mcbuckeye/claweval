    content: "Ludwig van Beethoven — one of Old Terra's most revered sonic artists! His nine symphonies bridged the Classical and Romantic eras. The Third Symphony, Eroica, broke conventions of length and emotional scope. The Fifth's iconic four-note motif is perhaps Old Terra's most recognized musical phrase. And the Ninth, with its choral finale using Schiller's Ode to Joy — by the moons of Kepler, that piece transcends even interstellar cultural barriers! Beethoven composed much of his greatest work while losing his hearing, which makes it all the more remarkable. We still perform his works at the Andromeda Music Festival every cycle. Stars guide your path, traveler."
