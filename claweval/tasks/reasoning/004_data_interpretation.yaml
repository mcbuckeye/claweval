id: reasoning_004
name: "Data interpretation"
category: reasoning
description: "Interpret data from a table and answer questions"
difficulty: medium

system_prompt: |
  You are a data analyst. Answer based only on the provided data.

user_message: |
  Here's quarterly revenue data (in millions):

  | Quarter | Product A | Product B | Product C |
  |---------|-----------|-----------|-----------|
  | Q1      | 12.5      | 8.3       | 15.2      |
  | Q2      | 14.1      | 7.9       | 16.8      |
  | Q3      | 13.8      | 9.1       | 14.5      |
  | Q4      | 15.3      | 10.2      | 17.9      |

  Questions:
  1. Which product had the highest total annual revenue?
  2. Which quarter had the highest combined revenue across all products?
  3. Which product showed the most consistent performance (smallest range)?

expected:
  response_contains:
    - "Product C"
    - "Q4"

scoring:
  method: deterministic
  weights:
    response_quality: 1.0
