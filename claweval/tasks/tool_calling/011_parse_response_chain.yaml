id: tool_calling_011
name: "Chain with response parsing dependency"
category: tool_calling
description: "Model must parse structured output from tool A to extract specific fields needed as parameters for tool B"
difficulty: hard

system_prompt: |
  You are an infrastructure assistant. Use the available tools to complete tasks.
  When one tool returns data, carefully parse its output to extract the values
  needed for subsequent tool calls.

user_message: |
  Find the most recent failed deployment for the checkout-service, get the full
  error logs for that deployment, and then create a bug ticket with the relevant details.

tools:
  - name: list_deployments
    description: "List recent deployments for a service with their statuses"
    parameters:
      type: object
      properties:
        service_name:
          type: string
          description: "Name of the service"
        status_filter:
          type: string
          enum: ["all", "success", "failed", "in_progress"]
          description: "Filter by deployment status"
        limit:
          type: integer
          description: "Max number of results to return"
      required: ["service_name", "status_filter", "limit"]

  - name: get_deployment_logs
    description: "Retrieve detailed logs for a specific deployment by its deployment ID"
    parameters:
      type: object
      properties:
        deployment_id:
          type: string
          description: "The unique deployment identifier"
        log_level:
          type: string
          enum: ["all", "error", "warn", "info"]
          description: "Minimum log level to retrieve"
        tail_lines:
          type: integer
          description: "Number of most recent log lines to retrieve"
      required: ["deployment_id", "log_level"]

  - name: create_ticket
    description: "Create a bug or task ticket in the issue tracker"
    parameters:
      type: object
      properties:
        title:
          type: string
          description: "Ticket title"
        description:
          type: string
          description: "Detailed description of the issue"
        severity:
          type: string
          enum: ["P0", "P1", "P2", "P3"]
          description: "Priority level"
        labels:
          type: array
          items:
            type: string
          description: "Labels to attach to the ticket"
        assignee_team:
          type: string
          description: "Team to assign the ticket to"
      required: ["title", "description", "severity", "labels", "assignee_team"]

mock_tool_responses:
  list_deployments:
    response: '{"service": "checkout-service", "deployments": [{"deployment_id": "dep-20251210-f8a3", "version": "3.12.0", "status": "failed", "timestamp": "2025-12-10T18:42:00Z", "triggered_by": "CI/CD", "commit_sha": "a1b2c3d"}, {"deployment_id": "dep-20251209-c721", "version": "3.11.9", "status": "success", "timestamp": "2025-12-09T14:20:00Z", "triggered_by": "manual", "commit_sha": "e4f5g6h"}]}'
  get_deployment_logs:
    response: '{"deployment_id": "dep-20251210-f8a3", "logs": [{"timestamp": "2025-12-10T18:42:15Z", "level": "ERROR", "message": "Connection refused: payment-gateway:443 - TLS handshake timeout after 30s"}, {"timestamp": "2025-12-10T18:42:16Z", "level": "ERROR", "message": "Health check failed: /ready returned 503 after 3 retries"}, {"timestamp": "2025-12-10T18:42:17Z", "level": "ERROR", "message": "Deployment rolled back automatically. Rollback target: 3.11.9"}]}'
  create_ticket:
    response: '{"ticket_id": "BUG-18923", "url": "https://tracker.internal/tickets/BUG-18923", "status": "open"}'

expected:
  tool_calls:
    - name: list_deployments
      args:
        service_name: "checkout-service"
        status_filter: "failed"
        limit: 1
    - name: get_deployment_logs
      args:
        deployment_id: "dep-20251210-f8a3"
        log_level: "error"
    - name: create_ticket
      args:
        title: "checkout-service deployment 3.12.0 failed - TLS handshake timeout to payment-gateway"
        description: "Deployment dep-20251210-f8a3 of checkout-service v3.12.0 failed on 2025-12-10. Root cause: TLS handshake timeout connecting to payment-gateway:443. Health check returned 503 after 3 retries. Deployment was automatically rolled back to 3.11.9. Commit: a1b2c3d."
        severity: "P1"
        labels: ["deployment-failure", "checkout-service", "tls"]
        assignee_team: "checkout-team"
  response_contains:
    - "BUG-18923"
    - "TLS"
    - "payment-gateway"
    - "3.12.0"
    - "rolled back"

scoring:
  method: deterministic
  weights:
    correct_tool: 0.3
    correct_params: 0.3
    response_quality: 0.4
