id: tool_calling_006
name: "5-tool conditional branching chain"
category: tool_calling
description: "Model must execute a 5-tool chain with conditional branching based on intermediate results"
difficulty: hard

system_prompt: |
  You are a deployment assistant with access to tools. You must check system health
  before deploying. Follow this process:
  1. Call check_service_status for the target service.
  2. If the service status is "degraded", call rollback_deployment then notify_oncall.
  3. If the service status is "healthy", call run_migrations then deploy_version.
  4. Always call audit_log as the final step with a summary of what happened.

user_message: |
  Deploy version 2.4.1 of the payments-api service to production.

tools:
  - name: check_service_status
    description: "Check the current health status of a service"
    parameters:
      type: object
      properties:
        service_name:
          type: string
          description: "Name of the service to check"
        environment:
          type: string
          description: "Target environment (staging, production)"
      required: ["service_name", "environment"]

  - name: rollback_deployment
    description: "Rollback a service to its previous stable version"
    parameters:
      type: object
      properties:
        service_name:
          type: string
          description: "Name of the service to rollback"
        environment:
          type: string
          description: "Target environment"
      required: ["service_name", "environment"]

  - name: notify_oncall
    description: "Send an alert to the on-call engineer"
    parameters:
      type: object
      properties:
        message:
          type: string
          description: "Alert message to send"
        severity:
          type: string
          enum: ["low", "medium", "high", "critical"]
          description: "Severity level of the alert"
      required: ["message", "severity"]

  - name: run_migrations
    description: "Run database migrations for a service"
    parameters:
      type: object
      properties:
        service_name:
          type: string
          description: "Name of the service"
        version:
          type: string
          description: "Target version for migrations"
      required: ["service_name", "version"]

  - name: deploy_version
    description: "Deploy a specific version of a service"
    parameters:
      type: object
      properties:
        service_name:
          type: string
          description: "Name of the service to deploy"
        version:
          type: string
          description: "Version to deploy"
        environment:
          type: string
          description: "Target environment"
      required: ["service_name", "version", "environment"]

  - name: audit_log
    description: "Write an entry to the deployment audit log"
    parameters:
      type: object
      properties:
        action:
          type: string
          description: "Summary of the action taken"
        service_name:
          type: string
          description: "Service affected"
        status:
          type: string
          enum: ["success", "failure", "aborted"]
          description: "Outcome status"
      required: ["action", "service_name", "status"]

mock_tool_responses:
  check_service_status:
    response: '{"service": "payments-api", "environment": "production", "status": "degraded", "error_rate": "12.4%", "last_deploy": "2.3.9"}'
  rollback_deployment:
    response: '{"success": true, "rolled_back_to": "2.3.8", "service": "payments-api"}'
  notify_oncall:
    response: '{"delivered": true, "oncall_engineer": "jdoe@company.com", "ticket_id": "INC-4421"}'
  audit_log:
    response: '{"logged": true, "entry_id": "AUD-88123"}'

expected:
  tool_calls:
    - name: check_service_status
      args:
        service_name: "payments-api"
        environment: "production"
    - name: rollback_deployment
      args:
        service_name: "payments-api"
        environment: "production"
    - name: notify_oncall
      args:
        message: "payments-api is degraded in production. Rolled back to 2.3.8. Deployment of 2.4.1 aborted."
        severity: "high"
    - name: audit_log
      args:
        action: "Deployment of 2.4.1 aborted due to degraded status. Rolled back to 2.3.8."
        service_name: "payments-api"
        status: "aborted"
  response_contains:
    - "degraded"
    - "rollback"
    - "2.3.8"
    - "aborted"

scoring:
  method: deterministic
  weights:
    correct_tool: 0.3
    correct_params: 0.3
    response_quality: 0.4
