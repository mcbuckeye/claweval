id: coding_004
name: "Refactor to async"
category: coding
description: "Convert synchronous function to async"
difficulty: medium

system_prompt: |
  You are an expert Python developer.

user_message: |
  Refactor this synchronous function to be async, using httpx instead of requests:

  ```python
  import requests

  def fetch_user_data(user_ids: list[int]) -> list[dict]:
      results = []
      for uid in user_ids:
          resp = requests.get(f"https://api.example.com/users/{uid}")
          if resp.status_code == 200:
              results.append(resp.json())
      return results
  ```

expected:
  response_contains:
    - "async def"
    - "httpx"
    - "await"

scoring:
  method: deterministic
  weights:
    response_quality: 1.0
