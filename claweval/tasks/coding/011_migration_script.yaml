id: coding_011
name: "Write a migration script for a schema change"
category: coding
description: "Write a reversible database migration script for a complex schema change with data transformation"
difficulty: hard

system_prompt: |
  You are an expert database engineer with deep knowledge of SQL migrations, data integrity, and zero-downtime deployment strategies.

user_message: |
  Write an Alembic migration script that performs the following schema change on a PostgreSQL database. The migration must be reversible (implement both `upgrade()` and `downgrade()`).

  Current schema:
  ```sql
  CREATE TABLE orders (
      id SERIAL PRIMARY KEY,
      customer_email VARCHAR(255) NOT NULL,
      customer_name VARCHAR(255) NOT NULL,
      customer_phone VARCHAR(50),
      total_amount NUMERIC(10,2) NOT NULL,
      shipping_address TEXT NOT NULL,
      billing_address TEXT,
      status VARCHAR(20) DEFAULT 'pending',
      notes TEXT,
      created_at TIMESTAMP DEFAULT NOW(),
      updated_at TIMESTAMP DEFAULT NOW()
  );

  CREATE TABLE order_items (
      id SERIAL PRIMARY KEY,
      order_id INTEGER REFERENCES orders(id),
      product_name VARCHAR(255) NOT NULL,
      quantity INTEGER NOT NULL,
      unit_price NUMERIC(10,2) NOT NULL
  );
  ```

  Required changes:
  1. Extract customer fields into a new `customers` table (id, email UNIQUE, name, phone, created_at)
  2. Replace `customer_email`, `customer_name`, `customer_phone` in orders with a `customer_id` foreign key
  3. Split `shipping_address` and `billing_address` into a new `addresses` table (id, customer_id FK, type ENUM('shipping','billing'), line1, line2, city, state, postal_code, country)
  4. Add `shipping_address_id` and `billing_address_id` foreign key columns to orders (replacing the text columns)
  5. Migrate existing data: create customer records from distinct emails, parse address text (assume format "line1, city, state postal_code, country"), and link everything
  6. Add appropriate indexes on foreign keys and the customers.email column

  The migration must:
  - Use `op.execute()` for raw SQL data migration steps
  - Handle the case where multiple orders share the same customer_email (deduplication)
  - Be wrapped in a transaction (Alembic default, but be explicit about data migration ordering)
  - Include a complete `downgrade()` that reverses all changes and restores original data

expected:
  response_contains:
    - "op.create_table"
    - "op.add_column"
    - "op.drop_column"
    - "customer_id"
    - "downgrade"
    - "op.execute"

scoring:
  method: deterministic
  weights:
    response_quality: 1.0
