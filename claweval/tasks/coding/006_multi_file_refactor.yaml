id: coding_006
name: "Multi-file refactor"
category: coding
description: "Update 3 files consistently — model, route, and test — to add a new field"
difficulty: hard

system_prompt: |
  You are an expert Python developer specializing in FastAPI applications and test-driven development.

user_message: |
  I need to add a "role" field (enum: "admin", "editor", "viewer", default "viewer") to our User model. Update all three files consistently.

  File 1 — models/user.py:
  ```python
  from sqlalchemy import Column, Integer, String, DateTime
  from sqlalchemy.ext.declarative import declarative_base
  from datetime import datetime

  Base = declarative_base()

  class User(Base):
      __tablename__ = "users"
      id = Column(Integer, primary_key=True, index=True)
      username = Column(String(50), unique=True, nullable=False)
      email = Column(String(120), unique=True, nullable=False)
      hashed_password = Column(String(255), nullable=False)
      created_at = Column(DateTime, default=datetime.utcnow)
      is_active = Column(Boolean, default=True)

      def to_dict(self):
          return {
              "id": self.id,
              "username": self.username,
              "email": self.email,
              "is_active": self.is_active,
              "created_at": self.created_at.isoformat(),
          }
  ```

  File 2 — routes/users.py:
  ```python
  from fastapi import APIRouter, Depends, HTTPException
  from sqlalchemy.orm import Session
  from pydantic import BaseModel, EmailStr
  from models.user import User
  from database import get_db

  router = APIRouter(prefix="/users", tags=["users"])

  class UserCreate(BaseModel):
      username: str
      email: EmailStr
      password: str

  class UserResponse(BaseModel):
      id: int
      username: str
      email: str
      is_active: bool

      class Config:
          from_attributes = True

  @router.post("/", response_model=UserResponse)
  def create_user(user: UserCreate, db: Session = Depends(get_db)):
      db_user = User(username=user.username, email=user.email, hashed_password=hash_pw(user.password))
      db.add(db_user)
      db.commit()
      db.refresh(db_user)
      return db_user

  @router.get("/{user_id}", response_model=UserResponse)
  def get_user(user_id: int, db: Session = Depends(get_db)):
      user = db.query(User).filter(User.id == user_id).first()
      if not user:
          raise HTTPException(status_code=404, detail="User not found")
      return user
  ```

  File 3 — tests/test_users.py:
  ```python
  import pytest
  from fastapi.testclient import TestClient
  from main import app

  client = TestClient(app)

  def test_create_user():
      resp = client.post("/users/", json={"username": "alice", "email": "alice@example.com", "password": "secret"})
      assert resp.status_code == 200
      data = resp.json()
      assert data["username"] == "alice"
      assert data["is_active"] is True

  def test_get_user():
      resp = client.get("/users/1")
      assert resp.status_code == 200

  def test_create_duplicate_user():
      client.post("/users/", json={"username": "bob", "email": "bob@example.com", "password": "pw"})
      resp = client.post("/users/", json={"username": "bob", "email": "bob@example.com", "password": "pw"})
      assert resp.status_code in (400, 409, 422)
  ```

  Requirements:
  - Add a "role" column to the SQLAlchemy model using an Enum type with values "admin", "editor", "viewer" and default "viewer"
  - Update to_dict() to include the role
  - Add role to UserCreate (optional, defaults to "viewer"), UserResponse, and the create_user route
  - Add tests for: creating a user with explicit role, creating a user with default role, and verifying the role appears in GET responses
  - All three files must be consistent with each other

expected:
  response_contains:
    - "Enum"
    - "role"
    - "viewer"
    - "admin"
    - "UserCreate"
    - "test_"

scoring:
  method: deterministic
  weights:
    response_quality: 1.0
