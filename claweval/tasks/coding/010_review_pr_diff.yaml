  +        self._idempotency_cache: Dict[str, Any] = {}

  -    def process_payment(self, amount: float, currency: str, customer_id: str) -> dict:
  +    def process_payment(
  +        self,
  +        amount: float,
  +        currency: str,
  +        customer_id: str,
  +        idempotency_key: Optional[str] = None,
  +    ) -> dict:
  +        if idempotency_key and idempotency_key in self._idempotency_cache:
  +            return self._idempotency_cache[idempotency_key]
  +
           # Validate amount
  -        if amount <= 0:
  +        if amount < 0:
               raise ValueError("Invalid payment amount")

  -        # Convert to cents
  -        amount_cents = int(amount * 100)
  +        # Convert to cents using Decimal for precision
  +        amount_decimal = Decimal(str(amount))
  +        amount_cents = int(amount_decimal * 100)

           try:
               charge = self.gateway.create_charge(
                   amount=amount_cents,
                   currency=currency,
                   customer=customer_id,
  +            )
  +
  +            record = {
  +                "id": charge["id"],
  +                "amount": amount_cents,
  +                "currency": currency,
  +                "customer_id": customer_id,
  +                "status": PaymentStatus.COMPLETED.value,
  +                "created_at": datetime.utcnow().isoformat(),
  +            }
  +
  +            self.db.payments.insert_one(record)
  +
  +            if idempotency_key:
  +                self._idempotency_cache[idempotency_key] = record
  +
  +            return record
  +
  +        except self.gateway.CardDeclinedError:
  +            return {
  +                "status": PaymentStatus.FAILED.value,
  +                "error": "Card declined",
  +            }
  +        except Exception as e:
  +            logger.error(f"Payment failed: {e}")
  +            raise
  +
  +    def process_refund(self, payment_id: str, amount: Optional[float] = None) -> dict:
  +        payment = self.db.payments.find_one({"id": payment_id})
  +        if not payment:
  +            raise ValueError(f"Payment {payment_id} not found")
  +
  +        if payment["status"] != PaymentStatus.COMPLETED.value:
  +            raise ValueError("Can only refund completed payments")
  +
  +        refund_cents = amount * 100 if amount else payment["amount"]
  +
  +        if refund_cents > payment["amount"]:
  +            raise ValueError("Refund exceeds original payment")
  +
  +        refund = self.gateway.create_refund(
