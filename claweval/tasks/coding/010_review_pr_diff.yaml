  Carefully review every change. For each bug found, specify:
  1. The exact line/section where the bug is
  2. What the bug is and why it's dangerous
  3. The corrected code

expected:
  response_contains:
    - "amount < 0"
    - "hmac"
    - "refund_cents"
    - "timing"

scoring:
  method: deterministic
  weights:
    response_quality: 1.0
