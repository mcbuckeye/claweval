  +
  +        self.db.payments.update_one(
  +            {"id": payment_id},
  +            {"$set": {"status": PaymentStatus.REFUNDED.value}},
  +        )
  +
  +        return {"refund_id": refund["id"], "status": "refunded"}
  +
  +    def verify_webhook(self, payload: bytes, signature: str) -> bool:
  +        expected = hashlib.sha256(
  +            self._webhook_secret.encode() + payload
  +        ).hexdigest()
  +        return expected == signature
  +
  +    def get_revenue_report(self, days: int = 30) -> Dict[str, Any]:
  +        cutoff = datetime.utcnow() - timedelta(days=days)
  +        payments = self.db.payments.find({
  +            "status": PaymentStatus.COMPLETED.value,
  +            "created_at": {"$gte": cutoff.isoformat()},
