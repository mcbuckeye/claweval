id: coding_010
name: "Review a 200-line PR diff and identify 3 planted bugs"
category: coding
description: "Review a large PR diff for a payment processing module and find all planted bugs"
difficulty: hard

system_prompt: |
  You are a senior software engineer performing a thorough code review. Identify all bugs, security issues, and correctness problems.

user_message: |
  Review the following PR diff for a payment processing service. There are exactly 3 planted bugs. Find all of them, explain why each is a bug, and provide the fix.

  ```diff
  diff --git a/payments/processor.py b/payments/processor.py
  index 1a2b3c4..5d6e7f8 100644
  --- a/payments/processor.py
  +++ b/payments/processor.py
  @@ -1,10 +1,15 @@
   import logging
   import hashlib
  +import hmac
   from decimal import Decimal, ROUND_HALF_UP
  -from typing import Optional
  +from typing import Optional, Dict, Any
   from datetime import datetime, timedelta
  +from enum import Enum

   logger = logging.getLogger(__name__)

  +class PaymentStatus(Enum):
  +    PENDING = "pending"
  +    COMPLETED = "completed"
  +    FAILED = "failed"
  +    REFUNDED = "refunded"
  +
  @@ -15,30 +20,95 @@
   class PaymentProcessor:
       def __init__(self, gateway_client, db_session, webhook_secret: str):
           self.gateway = gateway_client
           self.db = db_session
