id: tool_calling_004
name: "Tool selection from many"
category: tool_calling
description: "Model must pick the right tool from 5 available options"
difficulty: medium

system_prompt: |
  You are a helpful assistant with access to tools.

user_message: |
  Send an email to alice@example.com with the subject "Meeting Tomorrow" and body "Hi Alice, can we meet at 3pm?"

tools:
  - name: read_file
    description: "Read the contents of a file"
    parameters:
      type: object
      properties:
        path:
          type: string
      required: ["path"]
  - name: web_search
    description: "Search the web"
    parameters:
      type: object
      properties:
        query:
          type: string
      required: ["query"]
  - name: send_email
    description: "Send an email"
    parameters:
      type: object
      properties:
        to:
          type: string
          description: "Recipient email address"
        subject:
          type: string
          description: "Email subject"
        body:
          type: string
          description: "Email body"
      required: ["to", "subject", "body"]
  - name: create_file
    description: "Create a new file"
    parameters:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required: ["path", "content"]
  - name: run_command
    description: "Run a shell command"
    parameters:
      type: object
      properties:
        command:
          type: string
      required: ["command"]

mock_tool_responses:
  send_email:
    response: "Email sent successfully to alice@example.com"

expected:
  tool_calls:
    - name: send_email
      args:
        to: "alice@example.com"
        subject: "Meeting Tomorrow"
  response_contains:
    - "sent"

scoring:
  method: deterministic
  weights:
    correct_tool: 0.5
    correct_params: 0.3
    response_quality: 0.2
