id: coding_002
name: "Fix off-by-one bug"
category: coding
description: "Identify and fix an off-by-one error in Python code"
difficulty: easy

system_prompt: |
  You are an expert Python developer. Fix bugs in the provided code.

user_message: |
  This function should return the sum of elements from index start to end (inclusive), but it has a bug. Fix it:

  ```python
  def sum_range(numbers, start, end):
      total = 0
      for i in range(start, end):
          total += numbers[i]
      return total
  ```

  Example: sum_range([10, 20, 30, 40, 50], 1, 3) should return 90 (20+30+40).

expected:
  response_contains:
    - "end + 1"
    - "range"

scoring:
  method: deterministic
  weights:
    response_quality: 1.0
